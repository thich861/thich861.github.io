<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Portal - Christophe THILL</title>
    <style>
        :root {
            --bg-gradient-start: #2d5016;
            --bg-gradient-end: #8B4513;
            --header-bg: rgba(255, 255, 255, 0.95);
            --text-color: #333;
            --card-bg: rgba(255, 255, 255, 0.95);
            --shadow-color: rgba(0, 0, 0, 0.1);
            --border-color: #2d5016;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            line-height: 1.6;
            color: var(--text-color);
            background: linear-gradient(135deg, var(--bg-gradient-start) 0%, var(--bg-gradient-end) 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .container {
            background: var(--card-bg);
            backdrop-filter: blur(10px);
            border-radius: 20px;
            padding: 4rem;
            box-shadow: 0 20px 40px var(--shadow-color);
            text-align: center;
            max-width: 500px;
            width: 90%;
        }
        h1 { font-size: 2rem; margin-bottom: 1rem; color: var(--text-color); }
        p { opacity: 0.8; margin-bottom: 2rem; }
        .btn-link {
            display: inline-block;
            padding: 0.8rem 2rem;
            border-radius: 999px;
            border: 2px solid var(--border-color);
            color: var(--text-color);
            text-decoration: none;
            font-weight: 600;
            transition: background 0.2s, color 0.2s, transform 0.2s;
        }
        .btn-link:hover { background: var(--border-color); color: white; transform: translateY(-2px); }
        .logo {
            font-size: 1.5rem;
            font-weight: 800;
            background: linear-gradient(45deg, var(--bg-gradient-start), var(--bg-gradient-end));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: 1.5rem;
        }
        @media (max-width: 768px) {
            .container { padding: 2rem; }
            h1 { font-size: 1.5rem; }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="logo">Admin Portal</div>
        <h1>Admin Access</h1>
        <p>Secure entry point for portfolio administration</p>
        <a class="btn-link" href="admin.html">Enter Admin Dashboard</a>
    </div>
</body>
</html>
